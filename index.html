<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Academy Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1B365D;
            --secondary: #C5A059;
            --bg-beige: #FAF9F6;
            --card-bg: #FFFFFF;
            --text-main: #2D3436;
            --text-muted: #636E72;
            --accent: #800020;
            --success: #27AE60;
            --warning: #E67E22;
            --danger: #C0392B;
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-beige);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px 16px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
            padding-top: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
            border-bottom: 3px solid var(--secondary);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: block;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
        }

        .course-section {
            margin-bottom: 24px;
        }

        .course-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .course-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--primary);
        }

        .task-list {
            display: grid;
            gap: 12px;
        }

        .task-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease;
            border-left: 4px solid var(--secondary);
        }

        .task-card:active {
            transform: scale(0.98);
        }

        .task-info {
            flex: 1;
        }

        .task-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .task-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .task-status {
            text-align: right;
            padding-left: 12px;
        }

        .days-left {
            font-size: 0.85rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .status-urgent {
            background: rgba(192, 57, 43, 0.1);
            color: var(--danger);
        }

        .status-soon {
            background: rgba(230, 126, 34, 0.1);
            color: var(--warning);
        }

        .status-safe {
            background: rgba(39, 174, 96, 0.1);
            color: var(--success);
        }
        
        .status-passed {
            background: #eee;
            color: #999;
            text-decoration: line-through;
        }

        .footer {
            text-align: center;
            margin-top: 48px;
            padding-bottom: 24px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .stat-value { font-size: 1.25rem; }
        }

        /* Desktop specific */
        @media (min-width: 768px) {
            .task-list {
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="site-title">Academy</h1>
            <p class="subtitle">Semester Tracking</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-value" id="days-remaining">-</span>
                <span class="stat-label">Days Left</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="pending-tasks">-</span>
                <span class="stat-label">Tasks Open</span>
            </div>
        </div>

        <div id="courses-container">
            <!-- Courses will be loaded here -->
        </div>

        <div class="footer">
            &copy; <span id="year"></span> Academy Dashboard
        </div>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        async function loadDashboard() {
            try {
                const response = await fetch('config.json');
                const config = await response.json();
                
                // Apply theme if provided
                if (config.settings && config.settings.theme) {
                    const root = document.documentElement;
                    const theme = config.settings.theme;
                    if (theme.primary) root.style.setProperty('--primary', theme.primary);
                    if (theme.secondary) root.style.setProperty('--secondary', theme.secondary);
                    if (theme.background) root.style.setProperty('--bg-beige', theme.background);
                    if (theme.accent) root.style.setProperty('--accent', theme.accent);
                }

                if (config.settings && config.settings.title) {
                    document.getElementById('site-title').textContent = config.settings.title;
                    document.title = config.settings.title;
                }

                renderDashboard(config);
            } catch (error) {
                console.error('Error loading config:', error);
                document.getElementById('courses-container').innerHTML = '<p style="text-align:center; color:red;">Failed to load configuration.</p>';
            }
        }

        function getDaysDiff(dateStr) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const target = new Date(dateStr);
            target.setHours(0, 0, 0, 0);
            const diffTime = target - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        function getStatusClass(days) {
            if (days < 0) return 'status-passed';
            if (days <= 3) return 'status-urgent';
            if (days <= 7) return 'status-soon';
            return 'status-safe';
        }

        function formatStatusText(days) {
            if (days < 0) return 'Passed';
            if (days === 0) return 'Today';
            if (days === 1) return 'Tomorrow';
            return `${days} days`;
        }

        function renderDashboard(config) {
            const container = document.getElementById('courses-container');
            container.innerHTML = '';

            let totalPending = 0;
            let soonestDeadline = Infinity;

            config.courses.forEach(course => {
                const activeTasks = course.tasks.filter(t => getDaysDiff(t.deadline) >= 0);
                totalPending += activeTasks.length;

                const courseSection = document.createElement('div');
                courseSection.className = 'course-section';

                const header = document.createElement('div');
                header.className = 'course-header';
                header.innerHTML = `<h2 class="course-title">${course.name}</h2>`;
                courseSection.appendChild(header);

                const taskList = document.createElement('div');
                taskList.className = 'task-list';

                course.tasks.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));

                course.tasks.forEach(task => {
                    const days = getDaysDiff(task.deadline);
                    if (days >= 0 && days < soonestDeadline) soonestDeadline = days;

                    const taskCard = document.createElement('div');
                    taskCard.className = 'task-card';
                    
                    const statusClass = getStatusClass(days);
                    const statusText = formatStatusText(days);

                    taskCard.innerHTML = `
                        <div class="task-info">
                            <div class="task-name">${task.name}</div>
                            <div class="task-date">${new Date(task.deadline).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })}</div>
                        </div>
                        <div class="task-status">
                            <span class="days-left ${statusClass}">${statusText}</span>
                        </div>
                    `;
                    taskList.appendChild(taskCard);
                });

                courseSection.appendChild(taskList);
                container.appendChild(courseSection);
            });

            document.getElementById('pending-tasks').textContent = totalPending;
            document.getElementById('days-remaining').textContent = soonestDeadline === Infinity ? '-' : soonestDeadline;
        }

        loadDashboard();
    </script>
</body>
</html>
